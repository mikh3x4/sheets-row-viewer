<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Reviewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --card-bg: #ffffff;
    --border: #e0e3eb;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --green: #16a34a;
    --orange: #ea580c;
    --red: #dc2626;
    --editable-bg: #f0f4ff;
    --shared-bg: #fef9ee;
    --readonly-bg: #f9fafb;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .topbar-left { display: flex; align-items: center; gap: 8px; }
  .topbar-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .nav-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 6px 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--primary-hover); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .nav-info {
    font-size: 14px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .jump-input {
    width: 70px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    text-align: center;
  }

  .search-input {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    width: 200px;
  }

  .jump-id-input {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    width: 120px;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--primary); color: var(--primary); }

  .user-info {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Filter bar */
  .filter-bar {
    background: #eef2ff;
    padding: 6px 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .filter-bar.hidden { display: none; }
  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--primary);
    color: #fff;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
  }
  .filter-tag button {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }

  /* Auth / Setup screens */
  .screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .screen h1 { font-size: 28px; margin-bottom: 12px; }
  .screen p { color: var(--text-muted); margin-bottom: 20px; max-width: 500px; }
  .screen input[type="text"] {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 12px;
  }
  .screen .btn-primary {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 24px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .screen .btn-primary:hover { background: var(--primary-hover); }

  /* Main content */
  .main-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* Field cards */
  .field-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 12px;
  }
  .field-card.editable-mine {
    background: var(--editable-bg);
    border-color: #a5b4fc;
  }
  .field-card.editable-shared {
    background: var(--shared-bg);
    border-color: #fbbf24;
  }
  .field-card.readonly-reviewer {
    background: var(--readonly-bg);
    opacity: 0.75;
  }

  .field-card.compact {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 18px;
  }
  .field-card.compact .field-header {
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .field-card.compact .field-value {
    flex: 1;
    text-align: right;
  }

  .field-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .field-owner {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
  }
  .filter-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px 6px;
    border-radius: 4px;
    transition: all 0.15s;
    margin-left: 4px;
    vertical-align: middle;
    display: inline-flex;
    align-items: center;
  }
  .filter-icon svg { pointer-events: none; }
  .filter-icon:hover { color: var(--primary); background: #eef2ff; }
  .filter-icon.active { color: var(--primary); background: #eef2ff; }

  .field-value {
    font-size: 15px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .field-value a {
    color: var(--primary);
    text-decoration: underline;
  }
  .field-value.empty {
    color: var(--text-muted);
    font-style: italic;
  }

  .field-textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    min-height: 40px;
    transition: border-color 0.15s;
  }
  .field-textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
  }

  /* Save indicator */
  .save-indicator {
    font-size: 12px;
    margin-top: 4px;
    height: 18px;
  }
  .save-indicator.saving { color: var(--orange); }
  .save-indicator.saved { color: var(--green); }
  .save-indicator.error { color: var(--red); }

  /* Section divider */
  .section-divider {
    text-align: center;
    margin: 24px 0 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .section-divider::before { left: 0; }
  .section-divider::after { right: 0; }

  /* Embedded content */
  .embed-container {
    margin-top: 8px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .embed-container iframe {
    width: 100%;
    height: 600px;
    border: none;
  }

  /* Filter popover */
  .filter-popover {
    position: fixed;
    z-index: 200;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    padding: 12px;
    min-width: 240px;
    max-width: 320px;
    max-height: 350px;
    overflow-y: auto;
  }
  .filter-popover.hidden { display: none; }
  .filter-popover h4 {
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--text-muted);
  }
  .filter-popover label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 14px;
    cursor: pointer;
  }
  .filter-popover input[type="text"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }
  .filter-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .filter-actions button {
    flex: 1;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 13px;
  }
  .filter-actions button.apply {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 12px;
    color: var(--text-muted);
  }

  /* Keyboard shortcuts hint */
  .kbd-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  kbd {
    background: #e5e7eb;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 11px;
  }
</style>
</head>
<body>

<!-- Screen: No sheet ID provided -->
<div id="screen-setup" class="screen" style="display:none;">
  <h1>Application Reviewer</h1>
  <p>Paste a Google Sheets URL or Sheet ID below to get started.</p>
  <input type="text" id="sheet-url-input" placeholder="https://docs.google.com/spreadsheets/d/abc123.../edit">
  <br>
  <button class="btn-primary" onclick="handleSheetSubmit()">Open Sheet</button>
</div>

<!-- Screen: Auth -->
<div id="screen-auth" class="screen" style="display:none;">
  <h1>Application Reviewer</h1>
  <p>Sign in with your Google account to access the sheet.</p>
  <button class="btn-primary" id="btn-signin" onclick="handleSignIn()">Sign in with Google</button>
</div>

<!-- Screen: Loading -->
<div id="screen-loading" class="loading-screen" style="display:none;">
  <div class="spinner"></div>
  <div>Loading sheet data...</div>
</div>

<!-- Screen: Main app -->
<div id="screen-app" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <button class="nav-btn" id="btn-prev" onclick="navigatePrev()" title="Previous (Left Arrow)">&#8592; Prev</button>
      <button class="nav-btn" id="btn-next" onclick="navigateNext()" title="Next (Right Arrow)">Next &#8594;</button>
      <input class="jump-input" id="jump-input" type="number" min="1" title="Jump to applicant #" onchange="handleJump()">
      <span class="nav-info" id="nav-info"></span>
    </div>
    <div class="topbar-center">
      <input class="search-input" id="global-search" type="text" placeholder="Search applicants..." oninput="handleGlobalSearch()">
      <input class="jump-id-input" id="jump-id-input" type="text" placeholder="Go to ID..." title="Jump to application by ID (Enter to go)" onkeydown="if(event.key==='Enter')handleJumpToId()">
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="refreshData()" title="Refresh data from sheet">&#x21bb; Refresh</button>
      <span class="user-info" id="user-info"></span>
      <button class="icon-btn" onclick="handleSignOut()">Sign out</button>
    </div>
  </div>
  <div id="filter-bar" class="filter-bar hidden">
    <span>Filters:</span>
    <span id="filter-tags"></span>
    <span id="filter-count" class="nav-info"></span>
    <button class="icon-btn" onclick="clearAllFilters()">Clear all</button>
  </div>
  <div class="main-content" id="applicant-view"></div>
</div>

<!-- Filter popover (reused) -->
<div id="filter-popover" class="filter-popover hidden"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
// IMPORTANT: Replace this with your own OAuth Client ID from Google Cloud Console
const CLIENT_ID = '611282666479-c3p3ml2bauacistvm7i9kb08esth33nh.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email';
const DISCOVERY_DOC = 'https://sheets.googleapis.com/$discovery/rest?version=v4';

// ============================================================
// STATE
// ============================================================
var spreadsheetId = null;
var accessToken = null;
var userEmail = null;
var tokenClient = null;

var headers = [];        // array of header strings
var rows = [];           // array of arrays (each row's cell values)
var columns = [];        // parsed column metadata: { index, name, rawHeader, type, ownerEmail }
                         // type: 'readonly' | 'editable-mine' | 'editable-shared' | 'editable-other'

var currentIndex = 0;    // index into filteredIndices
var filteredIndices = []; // indices into rows[] that pass all filters

var filters = {};         // { colIndex: { type: 'checklist'|'search', values: Set|string } }

var writeQueue = [];
var isWriting = false;
var sheetTabName = null;  // resolved sheet tab name for writes
var refreshTimer = null;  // debounce timer for lazy refresh
var isRefreshing = false; // prevent overlapping refreshes

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  // Parse sheet ID from URL
  const params = new URLSearchParams(window.location.search);
  const sheetParam = params.get('sheet');

  if (sheetParam) {
    spreadsheetId = sheetParam;
    showScreen('loading'); // Show loading while attempting silent auth
    loadGsiScript();
  } else {
    showScreen('setup');
  }

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); navigatePrev(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); navigateNext(); }
  });

  // Close filter popover on outside click
  document.addEventListener('click', (e) => {
    const pop = document.getElementById('filter-popover');
    if (!pop.classList.contains('hidden') && !pop.contains(e.target) && !e.target.closest('.filter-icon')) {
      pop.classList.add('hidden');
    }
  });
});

function showScreen(name) {
  ['screen-setup', 'screen-auth', 'screen-loading', 'screen-app'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  const el = document.getElementById('screen-' + name);
  if (el) el.style.display = '';
}

// ============================================================
// SHEET SETUP
// ============================================================
function handleSheetSubmit() {
  const input = document.getElementById('sheet-url-input').value.trim();
  if (!input) return;

  // Try to extract sheet ID from a Google Sheets URL
  const match = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  const id = match ? match[1] : input;

  // Redirect to parameterized URL
  const url = new URL(window.location.href);
  url.searchParams.set('sheet', id);
  window.location.href = url.toString();
}

// ============================================================
// GOOGLE IDENTITY SERVICES (OAuth)
// ============================================================
function loadGsiScript() {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = initTokenClient;
  script.onerror = () => alert('Failed to load Google Identity Services. Check your internet connection.');
  document.head.appendChild(script);
}

function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: handleTokenResponse,
  });

  // Try to restore session from localStorage
  tryRestoreSession();
}

async function tryRestoreSession() {
  const saved = localStorage.getItem('reviewer_auth');
  if (!saved) { showScreen('auth'); return; }

  try {
    const { token, email } = JSON.parse(saved);
    // Validate the token is still alive
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) { localStorage.removeItem('reviewer_auth'); showScreen('auth'); return; }

    const info = await res.json();
    accessToken = token;
    userEmail = info.email.toLowerCase();
    document.getElementById('user-info').textContent = userEmail;
    showScreen('loading');
    await loadSheetData();
  } catch (e) {
    localStorage.removeItem('reviewer_auth');
    showScreen('auth');
  }
}

function handleSignIn() {
  if (!tokenClient) {
    alert('Google auth not ready yet. Please wait a moment and try again.');
    return;
  }
  tokenClient.requestAccessToken();
}

async function handleTokenResponse(resp) {
  if (resp.error) {
    console.error('OAuth error:', resp);
    alert('Authentication failed: ' + (resp.error_description || resp.error));
    return;
  }

  accessToken = resp.access_token;

  // Fetch user email
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const info = await res.json();
    userEmail = info.email.toLowerCase();
    document.getElementById('user-info').textContent = userEmail;
  } catch (e) {
    console.error('Failed to get user info:', e);
    alert('Failed to get user info. Try again.');
    return;
  }

  // Save to localStorage for reload persistence
  localStorage.setItem('reviewer_auth', JSON.stringify({ token: accessToken, email: userEmail }));

  showScreen('loading');
  await loadSheetData();
}

function handleSignOut() {
  if (accessToken) {
    google.accounts.oauth2.revoke(accessToken);
  }
  localStorage.removeItem('reviewer_auth');
  accessToken = null;
  userEmail = null;
  headers = [];
  rows = [];
  columns = [];
  showScreen('auth');
}

// ============================================================
// SHEETS API
// ============================================================
async function sheetsApiGet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(range)}?valueRenderOption=FORMATTED_VALUE`;
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (res.status === 401) {
    localStorage.removeItem('reviewer_auth');
    showScreen('auth');
    throw new Error('Token expired');
  }
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Sheets API error ${res.status}: ${text}`);
  }
  return res.json();
}

async function sheetsApiUpdate(range, values) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ range, values }),
  });
  if (res.status === 401) {
    localStorage.removeItem('reviewer_auth');
    showScreen('auth');
    throw new Error('Token expired');
  }
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Sheets API write error ${res.status}: ${text}`);
  }
  return res.json();
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadSheetData() {
  showScreen('loading');
  try {
    // Check for tab name in URL params
    const params = new URLSearchParams(window.location.search);
    const tabParam = params.get('tab');
    let sheetName;

    if (tabParam) {
      sheetName = tabParam;
    } else {
      // Get spreadsheet metadata to find the first sheet name
      const metaRes = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties`,
        { headers: { Authorization: 'Bearer ' + accessToken } }
      );
      if (!metaRes.ok) throw new Error('Failed to fetch spreadsheet metadata');
      const meta = await metaRes.json();
      sheetName = meta.sheets[0].properties.title;
    }

    sheetTabName = sheetName;

    // Read all data
    const data = await sheetsApiGet(`'${sheetName}'`);
    if (!data.values || data.values.length < 2) {
      alert('Sheet appears to be empty or has only headers.');
      return;
    }

    headers = data.values[0];
    rows = data.values.slice(1);

    // Normalize row lengths
    const maxCols = headers.length;
    rows = rows.map(r => {
      while (r.length < maxCols) r.push('');
      return r;
    });

    parseColumns();
    resetFilters();
    currentIndex = 0;
    showScreen('app');
    renderApplicant();
  } catch (e) {
    console.error('Load error:', e);
    alert('Failed to load sheet: ' + e.message);
    showScreen('auth');
  }
}

async function refreshData() {
  await loadSheetData();
}

// Debounced background refresh: waits 2s after last navigation, then silently re-fetches
function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(silentRefresh, 2000);
}

async function silentRefresh() {
  if (isRefreshing || !accessToken || !spreadsheetId) return;
  isRefreshing = true;
  try {
    const params = new URLSearchParams(window.location.search);
    const tabParam = params.get('tab');
    let sheetName;

    if (tabParam) {
      sheetName = tabParam;
    } else {
      const metaRes = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties`,
        { headers: { Authorization: 'Bearer ' + accessToken } }
      );
      if (!metaRes.ok) { isRefreshing = false; return; }
      const meta = await metaRes.json();
      sheetName = meta.sheets[0].properties.title;
    }
    sheetTabName = sheetName;

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent("'" + sheetName + "'")}?valueRenderOption=FORMATTED_VALUE`;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    if (!res.ok) { isRefreshing = false; return; }
    const data = await res.json();
    if (!data.values || data.values.length < 2) { isRefreshing = false; return; }

    // Preserve the current applicant's identity (by row content) across refresh
    const oldRowIdx = filteredIndices[currentIndex];
    const oldFirstCell = oldRowIdx != null ? rows[oldRowIdx]?.[0] : null;

    headers = data.values[0];
    rows = data.values.slice(1);
    const maxCols = headers.length;
    rows = rows.map(r => { while (r.length < maxCols) r.push(''); return r; });

    parseColumns();
    applyFilters();

    // Try to stay on the same applicant by matching first cell value
    if (oldFirstCell != null) {
      const newFiltered = filteredIndices.findIndex(i => rows[i]?.[0] === oldFirstCell);
      if (newFiltered >= 0) currentIndex = newFiltered;
    }
    if (currentIndex >= filteredIndices.length) currentIndex = Math.max(0, filteredIndices.length - 1);

    // Re-render, but skip fields the user is currently editing
    const focused = document.activeElement;
    const isEditing = focused && (focused.tagName === 'TEXTAREA') && focused.closest('#applicant-view');
    if (!isEditing) {
      renderApplicant();
    }
  } catch (e) {
    console.error('Silent refresh failed:', e);
  }
  isRefreshing = false;
}

// ============================================================
// COLUMN PARSING
// ============================================================
const EDITABLE_RE = /^(.+?)\s*\[([^\]]+)\]\s*$/;

function parseColumns() {
  columns = headers.map((h, i) => {
    const m = h.match(EDITABLE_RE);
    if (m) {
      const name = m[1].trim();
      const bracket = m[2].trim();
      if (bracket === '*') {
        return { index: i, name, rawHeader: h, type: 'editable-shared', ownerEmail: null };
      }
      const email = bracket.toLowerCase();
      if (email === userEmail) {
        return { index: i, name, rawHeader: h, type: 'editable-mine', ownerEmail: email };
      }
      return { index: i, name, rawHeader: h, type: 'editable-other', ownerEmail: email };
    }
    return { index: i, name: h, rawHeader: h, type: 'readonly', ownerEmail: null };
  });
}

// ============================================================
// FILTERING
// ============================================================
function resetFilters() {
  filteredIndices = rows.map((_, i) => i);
  applyFilters();
}

function applyFilters() {
  const globalSearch = (document.getElementById('global-search')?.value || '').toLowerCase().trim();

  filteredIndices = [];
  for (let i = 0; i < rows.length; i++) {
    let pass = true;

    // Column filters
    for (const [colIdx, filter] of Object.entries(filters)) {
      const val = (rows[i][parseInt(colIdx)] || '').toString();
      if (filter.type === 'checklist') {
        const hasEmpty = filter.values.has('__empty__');
        const matchesValue = filter.values.has(val);
        const matchesEmpty = hasEmpty && val === '';
        if (!matchesValue && !matchesEmpty) { pass = false; break; }
      } else if (filter.type === 'search') {
        if (filter.value && !val.toLowerCase().includes(filter.value.toLowerCase())) { pass = false; break; }
      }
    }

    // Global search
    if (pass && globalSearch) {
      const rowText = rows[i].join(' ').toLowerCase();
      if (!rowText.includes(globalSearch)) pass = false;
    }

    if (pass) filteredIndices.push(i);
  }

  updateFilterBar();
  // Ensure currentIndex is valid
  if (currentIndex >= filteredIndices.length) currentIndex = Math.max(0, filteredIndices.length - 1);
  renderApplicant();
}

function handleGlobalSearch() {
  applyFilters();
}

function updateFilterBar() {
  const bar = document.getElementById('filter-bar');
  const tags = document.getElementById('filter-tags');
  const count = document.getElementById('filter-count');
  const activeFilters = Object.keys(filters);
  const globalSearch = (document.getElementById('global-search')?.value || '').trim();

  if (activeFilters.length === 0 && !globalSearch) {
    bar.classList.add('hidden');
    return;
  }

  bar.classList.remove('hidden');
  tags.innerHTML = '';

  // Show global search as a tag
  if (globalSearch) {
    const tag = document.createElement('span');
    tag.className = 'filter-tag';
    tag.innerHTML = `Search: ${escHtml(globalSearch)} <button onclick="clearGlobalSearch()">&times;</button>`;
    tags.appendChild(tag);
  }

  for (const colIdx of activeFilters) {
    const col = columns[parseInt(colIdx)];
    const filter = filters[colIdx];
    let detail = '';
    if (filter.type === 'search') {
      detail = `: "${filter.value}"`;
    } else if (filter.type === 'checklist') {
      const vals = [...filter.values].filter(v => v !== '__empty__');
      const hasEmpty = filter.values.has('__empty__');
      const parts = vals.map(v => v.length > 20 ? v.slice(0, 20) + '...' : v);
      if (hasEmpty) parts.push('(empty)');
      detail = parts.length <= 3 ? ': ' + parts.join(', ') : ': ' + parts.slice(0, 2).join(', ') + ` +${parts.length - 2} more`;
    }
    const tag = document.createElement('span');
    tag.className = 'filter-tag';
    tag.innerHTML = `${escHtml(col.name)}${escHtml(detail)} <button onclick="removeFilter(${colIdx})">&times;</button>`;
    tags.appendChild(tag);
  }
  count.textContent = `Showing ${filteredIndices.length} of ${rows.length} applicants`;
}

function removeFilter(colIdx) {
  delete filters[colIdx];
  applyFilters();
}

function clearGlobalSearch() {
  document.getElementById('global-search').value = '';
  applyFilters();
}

function clearAllFilters() {
  filters = {};
  document.getElementById('global-search').value = '';
  applyFilters();
}

function openFilterPopover(colIdx, buttonEl) {
  const pop = document.getElementById('filter-popover');
  const col = columns[colIdx];

  // Position near button
  const rect = buttonEl.getBoundingClientRect();
  pop.style.top = (rect.bottom + 4) + 'px';
  pop.style.left = Math.min(rect.left, window.innerWidth - 330) + 'px';
  pop.classList.remove('hidden');

  // Count distinct values
  const valueCounts = {};
  let emptyCount = 0;
  for (const row of rows) {
    const v = (row[colIdx] || '').toString();
    if (v === '') { emptyCount++; continue; }
    valueCounts[v] = (valueCounts[v] || 0) + 1;
  }
  const distinctValues = Object.keys(valueCounts).sort();
  const existingFilter = filters[colIdx];

  const searchCurrent = existingFilter?.type === 'search' ? existingFilter.value : '';
  let html = `<h4>Filter: ${escHtml(col.name)}</h4>`;
  html += `<input type="text" id="filter-search-input" value="${escAttr(searchCurrent)}" placeholder="Text search..." style="margin-bottom:8px;">`;
  html += `<div class="filter-actions" style="margin-top:0;margin-bottom:8px;">
    <button onclick="clearSearchFilter(${colIdx})">Clear</button>
    <button class="apply" onclick="applySearchFilter(${colIdx})">Apply text filter</button>
  </div>`;

  if (distinctValues.length <= 20) {
    const selectedValues = existingFilter?.type === 'checklist' ? new Set(existingFilter.values) : null;
    html += `<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;">`;
    html += `<label><input type="checkbox" data-val="__empty__" ${selectedValues ? (selectedValues.has('__empty__') ? 'checked' : '') : 'checked'}> (empty) <span style="color:#999">(${emptyCount})</span></label>`;
    for (const v of distinctValues) {
      const checked = selectedValues ? (selectedValues.has(v) ? 'checked' : '') : 'checked';
      html += `<label><input type="checkbox" data-val="${escAttr(v)}" ${checked}> ${escHtml(v.length > 50 ? v.slice(0, 50) + '...' : v)} <span style="color:#999">(${valueCounts[v]})</span></label>`;
    }
    html += `<div class="filter-actions">
      <button onclick="filterSelectAll(${colIdx}, this)">All</button>
      <button onclick="filterSelectNone(${colIdx}, this)">None</button>
      <button class="apply" onclick="applyChecklistFilter(${colIdx})">Apply checklist</button>
    </div></div>`;
  }
  pop.innerHTML = html;
}

function filterSelectAll(colIdx, btn) {
  const pop = document.getElementById('filter-popover');
  pop.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
}

function filterSelectNone(colIdx, btn) {
  const pop = document.getElementById('filter-popover');
  pop.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
}

function applyChecklistFilter(colIdx) {
  const pop = document.getElementById('filter-popover');
  const checked = new Set();
  pop.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
    checked.add(cb.dataset.val);
  });
  const allCheckboxes = pop.querySelectorAll('input[type="checkbox"]');
  if (checked.size === allCheckboxes.length) {
    // All selected = no filter
    delete filters[colIdx];
  } else {
    filters[colIdx] = { type: 'checklist', values: checked };
  }
  pop.classList.add('hidden');
  applyFilters();
}

function applySearchFilter(colIdx) {
  const val = document.getElementById('filter-search-input').value.trim();
  if (!val) {
    delete filters[colIdx];
  } else {
    filters[colIdx] = { type: 'search', value: val };
  }
  document.getElementById('filter-popover').classList.add('hidden');
  applyFilters();
}

function clearSearchFilter(colIdx) {
  delete filters[colIdx];
  document.getElementById('filter-popover').classList.add('hidden');
  applyFilters();
}

// ============================================================
// NAVIGATION
// ============================================================
function navigatePrev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderApplicant();
    scheduleRefresh();
  }
}

function navigateNext() {
  if (currentIndex < filteredIndices.length - 1) {
    currentIndex++;
    renderApplicant();
    scheduleRefresh();
  }
}

function handleJump() {
  const val = parseInt(document.getElementById('jump-input').value);
  if (isNaN(val) || val < 1 || val > filteredIndices.length) return;
  currentIndex = val - 1;
  renderApplicant();
  scheduleRefresh();
}

function handleJumpToId() {
  const input = document.getElementById('jump-id-input');
  const target = input.value.trim();
  if (!target) return;

  // Find the "id" column (case-insensitive)
  const idColIdx = headers.findIndex(h => h.toLowerCase().replace(/\s+/g, '') === 'id');
  if (idColIdx < 0) {
    // No "id" column — fall back to searching first column
    const match = filteredIndices.findIndex(i => (rows[i][0] || '').toString().toLowerCase() === target.toLowerCase());
    if (match >= 0) {
      currentIndex = match;
      renderApplicant();
      scheduleRefresh();
      input.value = '';
    } else {
      input.style.outline = '2px solid var(--red)';
      setTimeout(() => input.style.outline = '', 1000);
    }
    return;
  }

  // Search in filtered results first, then all rows
  let match = filteredIndices.findIndex(i => (rows[i][idColIdx] || '').toString().toLowerCase() === target.toLowerCase());
  if (match >= 0) {
    currentIndex = match;
    renderApplicant();
    scheduleRefresh();
    input.value = '';
    return;
  }

  // Not in filtered set — search all rows and clear filters to show it
  const allMatch = rows.findIndex(r => (r[idColIdx] || '').toString().toLowerCase() === target.toLowerCase());
  if (allMatch >= 0) {
    filters = {};
    document.getElementById('global-search').value = '';
    applyFilters();
    const newFilteredIdx = filteredIndices.indexOf(allMatch);
    if (newFilteredIdx >= 0) currentIndex = newFilteredIdx;
    renderApplicant();
    scheduleRefresh();
    input.value = '';
  } else {
    input.style.outline = '2px solid var(--red)';
    setTimeout(() => input.style.outline = '', 1000);
  }
}

// ============================================================
// RENDERING
// ============================================================
function renderApplicant() {
  const view = document.getElementById('applicant-view');
  const info = document.getElementById('nav-info');
  const jumpInput = document.getElementById('jump-input');
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next');

  if (filteredIndices.length === 0) {
    view.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">No applicants match the current filters.</div>';
    info.textContent = '0 of 0';
    jumpInput.value = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  const rowIdx = filteredIndices[currentIndex];
  const row = rows[rowIdx];

  prevBtn.disabled = currentIndex <= 0;
  nextBtn.disabled = currentIndex >= filteredIndices.length - 1;
  info.textContent = `${currentIndex + 1} of ${filteredIndices.length}` + (filteredIndices.length < rows.length ? ` (${rows.length} total)` : '');
  jumpInput.value = currentIndex + 1;
  jumpInput.max = filteredIndices.length;

  // Separate readonly and reviewer columns
  const readonlyCols = columns.filter(c => c.type === 'readonly');
  const reviewerCols = columns.filter(c => c.type !== 'readonly');

  let html = '';

  // Read-only application data
  for (const col of readonlyCols) {
    html += renderFieldCard(col, row[col.index], rowIdx);
  }

  // Reviewer section
  if (reviewerCols.length > 0) {
    html += '<div class="section-divider">Reviewer Fields</div>';
    for (const col of reviewerCols) {
      html += renderFieldCard(col, row[col.index], rowIdx);
    }
  }

  view.innerHTML = html;
  view.scrollTop = 0;
  window.scrollTo(0, 0);

  // Auto-size textareas
  view.querySelectorAll('textarea.field-textarea').forEach(autoResize);
}

function isShortValue(val) {
  if (!val) return true;
  return val.length <= 80 && !val.includes('\n') && !/^https?:\/\//i.test(val.trim());
}

function renderFieldCard(col, value, rowIdx) {
  const val = (value || '').toString();
  const typeClass = col.type === 'readonly' ? '' :
                    col.type === 'editable-mine' ? 'editable-mine' :
                    col.type === 'editable-shared' ? 'editable-shared' :
                    'readonly-reviewer';

  const isEditable = col.type === 'editable-mine' || col.type === 'editable-shared';
  const filterActive = filters[col.index] ? 'active' : '';
  const compact = !isEditable && isShortValue(val) ? 'compact' : '';

  let ownerHtml = '';
  if (col.type === 'editable-mine') ownerHtml = `<span class="field-owner">Your column</span>`;
  else if (col.type === 'editable-shared') ownerHtml = `<span class="field-owner">Shared (anyone can edit)</span>`;
  else if (col.type === 'editable-other') ownerHtml = `<span class="field-owner">${escHtml(col.ownerEmail)}</span>`;

  let bodyHtml = '';
  if (isEditable) {
    bodyHtml = `<textarea class="field-textarea" data-col="${col.index}" data-row="${rowIdx}"
      onblur="handleFieldSave(this)" oninput="autoResize(this)">${escHtml(val)}</textarea>
      <div class="save-indicator" id="save-${col.index}-${rowIdx}"></div>`;
  } else {
    bodyHtml = renderCellValue(val);
  }

  return `<div class="field-card ${typeClass} ${compact}">
    <div class="field-header">
      <span>
        <span class="field-label">${escHtml(col.name)}</span>
        <button class="filter-icon ${filterActive}" onclick="openFilterPopover(${col.index}, this)" title="Filter by this column"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg></button>
      </span>
      ${ownerHtml}
    </div>
    ${bodyHtml}
  </div>`;
}

function renderCellValue(val) {
  if (!val) return '<div class="field-value empty">(empty)</div>';

  // Check if URL
  if (/^https?:\/\//i.test(val.trim())) {
    const url = val.trim();
    let html = `<div class="field-value"><a href="${escAttr(url)}" target="_blank" rel="noopener">${escHtml(url)}</a></div>`;

    // Google Drive PDF
    const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (driveMatch) {
      const fileId = driveMatch[1];
      html += `<div class="embed-container"><iframe src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" loading="lazy"></iframe></div>`;
      return html;
    }

    // Google Drive open link
    const driveOpenMatch = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
    if (driveOpenMatch) {
      const fileId = driveOpenMatch[1];
      html += `<div class="embed-container"><iframe src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" loading="lazy"></iframe></div>`;
      return html;
    }

    // Direct PDF URL
    if (url.match(/\.pdf(\?|$)/i)) {
      html += `<div class="embed-container"><iframe src="${escAttr(url)}" loading="lazy"></iframe></div>`;
      return html;
    }

    return html;
  }

  // Plain text — handle multi-line
  return `<div class="field-value">${escHtml(val)}</div>`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(40, el.scrollHeight) + 'px';
}

// ============================================================
// SAVING (Write Queue)
// ============================================================
function handleFieldSave(textarea) {
  const colIdx = parseInt(textarea.dataset.col);
  const rowIdx = parseInt(textarea.dataset.row);
  const newValue = textarea.value;
  const oldValue = rows[rowIdx][colIdx] || '';

  if (newValue === oldValue) return;

  // Update local data immediately
  rows[rowIdx][colIdx] = newValue;

  // Show saving indicator
  const indicator = document.getElementById(`save-${colIdx}-${rowIdx}`);
  if (indicator) {
    indicator.textContent = 'Saving...';
    indicator.className = 'save-indicator saving';
  }

  // Enqueue write
  enqueueWrite(colIdx, rowIdx, newValue);
}

function enqueueWrite(colIdx, rowIdx, value) {
  writeQueue.push({ colIdx, rowIdx, value });
  processWriteQueue();
}

async function processWriteQueue() {
  if (isWriting || writeQueue.length === 0) return;
  isWriting = true;

  const { colIdx, rowIdx, value } = writeQueue.shift();
  const indicator = document.getElementById(`save-${colIdx}-${rowIdx}`);

  try {
    // Convert column index to A1 notation (include sheet name for multi-tab safety)
    const colLetter = colToLetter(colIdx);
    const sheetRow = rowIdx + 2; // +1 for header, +1 for 1-based
    const range = sheetTabName ? `'${sheetTabName}'!${colLetter}${sheetRow}` : `${colLetter}${sheetRow}`;

    await sheetsApiUpdate(range, [[value]]);

    if (indicator) {
      indicator.textContent = 'Saved \u2713';
      indicator.className = 'save-indicator saved';
      setTimeout(() => { indicator.textContent = ''; }, 2000);
    }
  } catch (e) {
    console.error('Save failed:', e);
    if (indicator) {
      indicator.textContent = 'Save failed!';
      indicator.className = 'save-indicator error';
    }
  }

  isWriting = false;
  processWriteQueue();
}

function colToLetter(col) {
  let letter = '';
  let c = col;
  while (c >= 0) {
    letter = String.fromCharCode((c % 26) + 65) + letter;
    c = Math.floor(c / 26) - 1;
  }
  return letter;
}

// ============================================================
// UTILITIES
// ============================================================
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
